name: test

on:
  push:
  pull_request:

jobs:
  coord:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install lint tools
        run: python3 -m pip install ruff
      - name: Lint scripts
        run: ruff check .
      - name: Check formatting
        run: ruff format --check .
      - name: Compile scripts
        run: python3 -m py_compile scripts/coord.py scripts/setup_agent_coordination.py scripts/test_coord.py
      - name: Run coordination self-test
        run: python3 scripts/test_coord.py
